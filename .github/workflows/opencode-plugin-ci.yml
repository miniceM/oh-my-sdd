name: OpenCode Plugin CI

on:
  pull_request:
    paths:
      - 'opencode/**'
      - 'package.json'
      - 'scripts/build-opencode-plugin.mjs'
      - '.github/workflows/opencode-plugin-ci.yml'

jobs:
  parity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Build opencode plugin
        run: npm run build:opencode
      - name: Run opencode unit tests
        run: node --test __tests__/unit/opencode/
      - name: Check dist is in sync with source
        run: git diff --exit-code opencode/dist/
      - name: Check baseline token budget
        run: npm run lint:baseline
